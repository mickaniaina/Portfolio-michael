<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=s, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #03060f;
      --surface: #070c1a;
      --border:  #0f1d35;
      --blue:    #0ea5ff;
      --purple:  #a855f7;
      --teal:    #06ffd4;
      --white:   #e2ecff;
      --muted:   #3d4f72;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cur  { position: fixed; width: 8px; height: 8px; background: var(--blue); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); box-shadow: 0 0 10px var(--blue), 0 0 24px var(--blue); }
    #curr { position: fixed; width: 32px; height: 32px; border: 1px solid rgba(14,165,255,.35); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width .2s, height .2s; }

    /* ── GRID BG ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(14,165,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,255,.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    /* ── LAYOUT ── */
    .wrap { max-width: 1040px; margin: 0 auto; padding: 0 36px; position: relative; z-index: 1; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(3,6,15,.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-in {
      max-width: 1040px; margin: 0 auto; padding: 0 36px;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px; color: var(--blue); text-decoration: none;
      letter-spacing: .1em; text-shadow: 0 0 14px var(--blue);
    }
    .nav-logo span { color: var(--purple); text-shadow: 0 0 14px var(--purple); }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color .2s, text-shadow .2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

    /* ── SECTIONS ── */
    section { padding: 110px 0 70px; position: relative; z-index: 1; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--blue), var(--purple), transparent); opacity: .15; position: relative; z-index: 1; }

    /* ══════════════════════════════
       HERO
    ══════════════════════════════ */
    #accueil { min-height: 100vh; display: flex; align-items: center; padding-top: 60px; }

    .hero-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 72px;
      align-items: center;
      width: 100%;
    }

    /* hero left */
    .hero-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--teal);
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 28px;
      opacity: 0; animation: fadeup .6s .1s ease forwards;
    }
    .hero-tag::before { content: ''; width: 24px; height: 1px; background: var(--teal); box-shadow: 0 0 8px var(--teal); }

    .hero-name {
      font-size: clamp(52px, 7vw, 88px);
      font-weight: 800; line-height: .95; letter-spacing: -.04em;
      margin-bottom: 24px;
      opacity: 0; animation: fadeup .7s .25s ease forwards;
    }
    .hero-name .l1 { display: block; color: var(--white); }
    .hero-name .l2 {
      display: block;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 28px rgba(14,165,255,.4));
    }

    .hero-role {
      font-size: 15px; font-weight: 300; color: var(--muted);
      margin-bottom: 32px; letter-spacing: .02em;
      opacity: 0; animation: fadeup .7s .4s ease forwards;
    }
    .hero-role strong { color: var(--white); font-weight: 600; }

    .hero-desc {
      font-size: 15px; color: var(--muted); line-height: 1.85;
      max-width: 480px; margin-bottom: 44px;
      opacity: 0; animation: fadeup .7s .52s ease forwards;
    }

    .hero-btns {
      display: flex; gap: 16px; flex-wrap: wrap;
      opacity: 0; animation: fadeup .7s .65s ease forwards;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 28px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; font-size: 12px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      text-decoration: none; border: none; cursor: pointer; border-radius: 3px;
      box-shadow: 0 0 30px rgba(14,165,255,.3);
      transition: box-shadow .3s, transform .2s;
    }
    .btn-primary:hover { box-shadow: 0 0 50px rgba(14,165,255,.5); transform: translateY(-2px); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 13px 28px; background: transparent;
      border: 1px solid var(--border); color: var(--muted);
      font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      text-decoration: none; border-radius: 3px;
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover { border-color: var(--blue); color: var(--white); }

    /* hero right — photo */
    .hero-right {
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; animation: fadeup .9s .3s ease forwards;
    }

    /* ── PHOTO : modifie le CSS ici ── */
    #photo {
      width: 340px;
      height: 420px;
      object-fit: cover;
      object-position: top;
      display: block;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(14,165,255,.08);
    }

    /* ══════════════════════════════
       SECTION HEADER
    ══════════════════════════════ */
    .sec-head { display: flex; align-items: center; gap: 20px; margin-bottom: 60px; }
    .sec-num  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--blue); letter-spacing: .14em; }
    .sec-title { font-size: 40px; font-weight: 800; letter-spacing: -.03em; color: var(--white); }
    .sec-line  { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

    /* ══════════════════════════════
       ABOUT
    ══════════════════════════════ */
    .about-grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 64px; align-items: start; }

    .about-text p { color: var(--muted); font-size: 15px; line-height: 1.9; margin-bottom: 20px; }
    .about-text p strong { color: var(--white); font-weight: 600; }

    .about-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }

    .acard {
      background: var(--surface); border: 1px solid var(--border);
      padding: 22px 18px; position: relative; overflow: hidden;
      transition: border-color .25s;
    }
    .acard::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      opacity: 0; transition: opacity .25s;
    }
    .acard:hover { border-color: rgba(14,165,255,.25); }
    .acard:hover::before { opacity: 1; }
    .acard-val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 500; color: var(--blue); text-shadow: 0 0 18px rgba(14,165,255,.45); margin-bottom: 4px; }
    .acard-lbl { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    /* ══════════════════════════════
       PROJECTS
    ══════════════════════════════ */
    .proj-list { display: flex; flex-direction: column; gap: 2px; }

    .pcard {
      display: grid; grid-template-columns: 1fr auto;
      align-items: center; gap: 32px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 32px 28px; position: relative; overflow: hidden;
      transition: border-color .25s, transform .25s;
    }
    .pcard::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--blue), var(--purple));
      opacity: 0; transition: opacity .25s;
    }
    .pcard:hover { border-color: rgba(14,165,255,.25); transform: translateX(6px); }
    .pcard:hover::before { opacity: 1; }

    .pcard-status {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .pcard-status::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--teal); box-shadow: 0 0 8px var(--teal);
      animation: blink 1.4s ease-in-out infinite;
    }
    .pcard-status.done { color: var(--muted); }
    .pcard-status.done::before { background: var(--muted); box-shadow: none; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .pcard-name { font-size: 20px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
    .pcard-desc { font-size: 13px; color: var(--muted); line-height: 1.75; margin-bottom: 16px; }
    .pcard-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .ptag {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      padding: 4px 10px; border: 1px solid var(--border); color: var(--muted);
      letter-spacing: .05em; border-radius: 2px; transition: border-color .2s, color .2s;
    }
    .pcard:hover .ptag { border-color: rgba(14,165,255,.25); color: var(--white); }
    .pcard-arrow { font-size: 20px; color: var(--muted); transition: color .2s, transform .2s; }
    .pcard:hover .pcard-arrow { color: var(--blue); transform: translateX(4px); }

    /* ══════════════════════════════
       SKILLS
    ══════════════════════════════ */
    .skills-layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: 64px; }
    .skill-list { display: flex; flex-direction: column; gap: 24px; }

    .sk-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .sk-name { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    .sk-pct  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--blue); }
    .sk-track { height: 2px; background: var(--border); position: relative; }
    .sk-fill {
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      transition: width 1.3s cubic-bezier(.23,1,.32,1);
      position: relative;
    }
    .sk-fill::after {
      content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--blue); box-shadow: 0 0 12px var(--blue);
    }

    .skills-right { display: flex; flex-direction: column; gap: 2px; }

    .sk-info {
      background: var(--surface); border: 1px solid var(--border); padding: 24px 22px;
    }
    .sk-info-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--blue); margin-bottom: 14px;
    }
    .sk-info-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .ltag {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 12px;
      border: 1px solid rgba(168,85,247,.3); color: var(--purple);
      background: rgba(168,85,247,.05); letter-spacing: .06em; border-radius: 2px;
    }

    /* ══════════════════════════════
       CONTACT
    ══════════════════════════════ */
    .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }

    .contact-big {
      font-size: clamp(36px, 4.5vw, 54px); font-weight: 800;
      letter-spacing: -.03em; line-height: 1.1; margin-bottom: 20px;
    }
    .contact-big span {
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .contact-sub { font-size: 14px; color: var(--muted); line-height: 1.85; margin-bottom: 36px; }

    .contact-links { display: flex; flex-direction: column; gap: 2px; }
    .cl {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; background: var(--surface); border: 1px solid var(--border);
      text-decoration: none; color: var(--white); font-size: 13px; font-weight: 600;
      transition: border-color .2s, background .2s;
    }
    .cl:hover { border-color: rgba(14,165,255,.3); background: rgba(14,165,255,.04); }
    .cl-left { display: flex; align-items: center; gap: 14px; }
    .cl-icon { font-size: 17px; }
    .cl-sub  { font-size: 11px; color: var(--muted); font-weight: 400; }
    .cl-arrow { color: var(--muted); font-size: 15px; transition: color .2s, transform .2s; }
    .cl:hover .cl-arrow { color: var(--blue); transform: translateX(4px); }

    /* ── FOOTER ── */
    footer { padding: 28px 0; border-top: 1px solid var(--border); position: relative; z-index: 1; }
    .footer-in {
      max-width: 1040px; margin: 0 auto; padding: 0 36px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .foot-l { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
    .foot-r  {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .65s ease, transform .65s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @keyframes fadeup { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 760px) {
      .hero-layout, .about-grid, .skills-layout, .contact-layout { grid-template-columns: 1fr; }
      .hero-right { order: -1; }
      #photo { width: 260px; height: 320px; }
    }
  </style>
